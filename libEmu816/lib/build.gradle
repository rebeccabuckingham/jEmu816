plugins {
    // Apply the cpp-library plugin to add support for building C++ libraries
    id 'cpp-library'

    // Apply the cpp-unit-test plugin to add support for building and running C++ test executables
    id 'cpp-unit-test'
}

library {
    // Set the target operating system and architecture for this library
    targetMachines.add(machines.macOS.architecture("aarch64"))
}

tasks.withType(CppCompile).configureEach {
  compilerArgs.add '-fPIC'
  compilerArgs.add '-I/Users/rebecca/.sdkman/candidates/java/17.0.9.fx-zulu/zulu-17.jdk/Contents/Home/include'
  compilerArgs.add '-I/Users/rebecca/.sdkman/candidates/java/17.0.9.fx-zulu/zulu-17.jdk/Contents/Home/include/darwin'
}

tasks.withType(LinkExecutable).configureEach {
  linkerArgs.add '-v'
  linkerArgs.add '-ljvm'
}